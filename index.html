<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สาขาเทคโนโลยีธุรกิจดิจิทัล - วิทยาลัยอาชีวศึกษาสระบุรี</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #ffffff;
            min-height: 100vh;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
        }

        /* Header Bar */
        .header {
            background: linear-gradient(90deg, #e2b0ff 0%, #a855f7 100%);
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header img {
            width: 55px;
            height: 55px;
            background: #fff;
            border-radius: 50%;
            padding: 3px;
        }

        .header-title h1 {
            font-size: 1.5rem;
            color: #d97706; /* สีทอง */
            font-weight: bold;
            text-shadow: 0px 1px 1px rgba(255,255,255,0.8);
        }

        .header-title h2 {
            font-size: 0.95rem;
            color: #d97706;
            letter-spacing: 1px;
        }

        /* Menu Grid */
        .menu-section {
            padding: 40px 20px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 850px;
            margin: 0 auto;
        }

        .menu-btn {
            background: #e5e7eb;
            border: none;
            border-radius: 50px;
            padding: 15px 10px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #b45309; /* สีข้อความทองเข้ม */
            text-align: center;
            text-decoration: none;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.8), 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .menu-btn:hover {
            transform: translateY(-2px);
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.8), 0 6px 12px rgba(0,0,0,0.15);
            background: #f3f4f6;
        }

        /* Content Section */
        .section-title {
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            margin: 30px 0 20px 0;
        }

        .activity-card {
            text-align: center;
            padding: 0 20px 40px 20px;
        }

        .activity-card img {
            width: 100%;
            max-width: 700px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .activity-card p {
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* Personnel Section */
        .personnel-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            padding: 20px;
            max-width: 850px;
            margin: 0 auto 50px auto;
        }

        .personnel-card {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .avatar-frame {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid #f59e0b;
            padding: 3px;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.3);
            overflow: hidden;
            background: #fff;
        }

        .avatar-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .badge {
            margin-top: 10px;
            background: #fef3c7;
            border: 1px solid #f59e0b;
            color: #92400e;
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 20px;
            text-align: center;
            font-weight: bold;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .menu-grid, .personnel-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .menu-grid, .personnel-grid {
                grid-template-columns: 1fr;
            }
            .header-title h1 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <img src="https://via.placeholder.com/60" alt="DBT Logo">
            <div class="header-title">
                <h1>วิทยาลัยอาชีวศึกษาสระบุรี</h1>
                <h2>DIGITAL BUSINESS TECHNOLOGY</h2>
            </div>
        </header>

        <section class="menu-section">
            <div class="menu-grid">
                <a href="#personnel" class="menu-btn">บุคลากร</a>
                <a href="#" class="menu-btn">ตารางสอน</a>
                <a href="#" class="menu-btn">ใบลา/ใบออกนอกวิทยาลัย</a>
                <a href="#activity" class="menu-btn">กิจกรรม</a>
                <a href="#" class="menu-btn">Facebook</a>
                <a href="#" class="menu-btn">รู้จักสาขาเรา</a>
            </div>
        </section>

        <hr style="border: none; border-top: 1px solid #eee; margin: 0 20px;">

        <section id="activity">
            <h2 class="section-title">กำหนดการกิจกรรม</h2>
            <div class="activity-card">
                <img src="https://via.placeholder.com/700x350" alt="กิจกรรมไหว้ครู">
                <p>กิจกรรมไหว้ครู ประจำปี 2569</p>
            </div>
        </section>

        <section id="personnel">
            <div class="header" style="margin-bottom: 30px;">
                <div class="header-title">
                    <h1 style="color: #d97706;">หน้า 2 - บุคลากร</h1>
                </div>
            </div>
            
            <div class="personnel-grid">
                <div class="personnel-card">
                    <div class="avatar-frame">
                        <img src="https://via.placeholder.com/150" alt="หัวหน้าสาขา">
                    </div>
                    <span class="badge">หัวหน้าสาขาเทคโนโลยีธุรกิจดิจิทัล</span>
                </div>
                <div class="personnel-card">
                    <div class="avatar-frame">
                        <img src="https://via.placeholder.com/150" alt="ครูประจำสาขา">
                    </div>
                    <span class="badge">ครูประจำสาขาเทคโนโลยีธุรกิจดิจิทัล</span>
                </div>
                <div class="personnel-card">
                    <div class="avatar-frame">
                        <img src="https://via.placeholder.com/150" alt="ครูประจำสาขา">
                    </div>
                    <span class="badge">ครูประจำสาขาเทคโนโลยีธุรกิจดิจิทัล</span>
                </div>
            </div>
        </section>
    </div>

</body>
</html>
